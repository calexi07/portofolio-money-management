<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EaglePips — Spendings</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<nav class="topnav">
  <div class="topnav-inner">
    <div class="brand"><span class="dot">●</span> EaglePips <span class="sub">Money Management</span></div>
    <div class="navlinks">
      <a href="index.html" data-page="overview">Overview</a>
      <a href="spendings.html" data-page="spendings">Spendings</a>
      <a href="income.html" data-page="income">Income</a>
    </div>
  </div>
</nav>

<div class="wrap">

  <header class="hero">
    <div class="eyebrow">Cheltuieli</div>
    <h1 class="title">Adaugă o <span class="accent">cheltuială</span>.</h1>
    <p class="subtitle">Ține evidența cheltuielilor — business (FlowerStation, trading) și personale.</p>
  </header>

  <div class="two-col">
    <div class="panel">
      <div class="panel-head"><h3>Cheltuială nouă</h3></div>
      <form id="spendForm">
        <input type="hidden" id="spendId">
        <div class="form-grid">
          <div class="field full">
            <label for="category">Categorie</label>
            <select id="category"></select>
          </div>
          <div class="field">
            <label for="amount">Sumă (lei)</label>
            <input type="number" id="amount" placeholder="250" step="0.01" required>
          </div>
          <div class="field">
            <label for="date">Dată</label>
            <input type="date" id="date" required>
          </div>
          <div class="field full">
            <label for="notes">Notă (opțional)</label>
            <textarea id="notes" placeholder="ex: factură curent, stoc trandafiri..."></textarea>
          </div>
        </div>
        <button type="submit" class="btn primary full" id="submitBtn">Adaugă cheltuiala</button>
      </form>
    </div>

    <div class="panel">
      <div class="panel-head">
        <h3>Cheltuieli înregistrate</h3>
        <span class="hint" id="filteredTotal"></span>
      </div>
      <div class="filter-row">
        <select id="monthFilter"></select>
        <select id="catFilter"></select>
      </div>
      <div class="tx-list" id="spendList"></div>
    </div>
  </div>

  <footer>
    <span>EaglePips Money Management · datele sunt salvate local în acest browser</span>
    <span id="totalCount"></span>
  </footer>
</div>

<script src="assets/app.js"></script>
<script>
MM.highlightNav('spendings');

const catSelect = document.getElementById('category');
MM.SPENDING_CATEGORIES.forEach(c => {
  const o = document.createElement('option'); o.value = c; o.textContent = c;
  catSelect.appendChild(o);
});

document.getElementById('date').value = new Date().toISOString().slice(0,10);

let editingId = null;

function populateFilters(){
  const spending = MM.loadSpending();
  const months = [...new Set(spending.map(t => MM.monthKey(t.date)))].sort().reverse();
  const monthFilter = document.getElementById('monthFilter');
  monthFilter.innerHTML = `<option value="all">Toate lunile</option>` + months.map(m => `<option value="${m}">${MM.monthLabel(m)}</option>`).join('');

  const catFilter = document.getElementById('catFilter');
  catFilter.innerHTML = `<option value="all">Toate categoriile</option>` + MM.SPENDING_CATEGORIES.map(c => `<option value="${MM.escapeHtml(c)}">${MM.escapeHtml(c)}</option>`).join('');
}

function renderList(){
  const spending = MM.loadSpending();
  const monthFilter = document.getElementById('monthFilter').value;
  const catFilter = document.getElementById('catFilter').value;

  let filtered = spending.slice();
  if(monthFilter !== 'all') filtered = filtered.filter(t => MM.monthKey(t.date) === monthFilter);
  if(catFilter !== 'all') filtered = filtered.filter(t => t.category === catFilter);
  filtered.sort((a,b) => (b.date||'').localeCompare(a.date||''));

  const total = filtered.reduce((s,t)=>s+Number(t.amount||0),0);
  document.getElementById('filteredTotal').textContent = MM.fmtMoney(total) + ' selectat';

  const el = document.getElementById('spendList');
  if(filtered.length === 0){
    el.innerHTML = `<div class="empty">Nicio cheltuială aici încă.</div>`;
  }else{
    el.innerHTML = filtered.map(t => `
      <div class="tx-row">
        <div class="tx-left">
          <span class="tx-cat">${MM.escapeHtml(t.category)}</span>
          <span class="tx-meta">${MM.fmtDate(t.date)}${t.notes ? ' · ' + MM.escapeHtml(t.notes) : ''}</span>
        </div>
        <span class="tx-amt spending">−${MM.fmtMoney(t.amount)}</span>
        <div class="tx-actions">
          <button class="icon-btn" onclick="editSpend('${t.id}')" title="Editează">✎</button>
          <button class="icon-btn" onclick="deleteSpend('${t.id}')" title="Șterge">🗑</button>
        </div>
      </div>
    `).join('');
  }

  document.getElementById('totalCount').textContent = spending.length + ' cheltuieli total';
}

window.editSpend = function(id){
  const spending = MM.loadSpending();
  const t = spending.find(x => x.id === id);
  if(!t) return;
  editingId = id;
  document.getElementById('category').value = t.category;
  document.getElementById('amount').value = t.amount;
  document.getElementById('date').value = t.date;
  document.getElementById('notes').value = t.notes || '';
  document.getElementById('submitBtn').textContent = 'Salvează modificarea';
  window.scrollTo({top:0, behavior:'smooth'});
};

window.deleteSpend = function(id){
  if(!confirm('Ștergi această cheltuială?')) return;
  let spending = MM.loadSpending();
  spending = spending.filter(t => t.id !== id);
  MM.saveSpending(spending);
  populateFilters();
  renderList();
};

document.getElementById('spendForm').addEventListener('submit', e => {
  e.preventDefault();
  let spending = MM.loadSpending();
  const entry = {
    id: editingId || MM.uid(),
    category: document.getElementById('category').value,
    amount: parseFloat(document.getElementById('amount').value) || 0,
    date: document.getElementById('date').value,
    notes: document.getElementById('notes').value.trim()
  };
  if(editingId){
    spending = spending.map(t => t.id === editingId ? entry : t);
  }else{
    spending.push(entry);
  }
  MM.saveSpending(spending);
  editingId = null;
  document.getElementById('submitBtn').textContent = 'Adaugă cheltuiala';
  e.target.reset();
  document.getElementById('date').value = new Date().toISOString().slice(0,10);
  populateFilters();
  renderList();
});

document.getElementById('monthFilter').addEventListener('change', renderList);
document.getElementById('catFilter').addEventListener('change', renderList);

populateFilters();
renderList();
</script>
</body>
</html>
